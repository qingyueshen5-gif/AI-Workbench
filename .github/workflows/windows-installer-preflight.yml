name: Windows Installer Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'electron/**'
      - 'src/**'
      - 'scripts/**'
      - 'server.mjs'
      - 'model-proxy.mjs'
      - 'readiness.mjs'
      - 'runtime-paths.mjs'
      - '.github/workflows/windows-installer-preflight.yml'

jobs:
  preflight:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer candidate
        id: build
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path verification/install-release | Out-Null
          npm run dist:win *>&1 | Tee-Object -FilePath verification/install-release/actions-build.log
          $artifactExists = Test-Path -LiteralPath 'release-v0.4.6-installer/AI-Workbench-Setup-v0.4.6-x64.exe'
          "artifact_exists=$artifactExists" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          exit $LASTEXITCODE

      - name: Run install-release preflight
        id: preflight
        if: always()
        shell: pwsh
        continue-on-error: true
        run: npm run verify:install-release

      - name: Write preflight summary
        if: always()
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Windows installer preflight"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Build outcome: ${{ steps.build.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Preflight outcome: ${{ steps.preflight.outcome }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Installer exists: ${{ steps.build.outputs.artifact_exists }}"
          if (Test-Path -LiteralPath 'verification/install-release/preflight-summary.json') {
            $summary = Get-Content -Raw -LiteralPath 'verification/install-release/preflight-summary.json' | ConvertFrom-Json
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Summary status: $($summary.status)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Artifact path: $($summary.artifactPath)"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Known issues: $($summary.knownIssues.Count)"
          } else {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Summary status: missing"
          }

      - name: Upload installer candidate and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-workbench-v0.4.6-installer-preflight
          path: |
            release-v0.4.6-installer/AI-Workbench-Setup-v0.4.6-x64.exe
            release-v0.4.6-installer/builder-debug.yml
            release-v0.4.6-installer/latest.yml
            verification/install-release/**
          if-no-files-found: warn

      - name: Fail when build or preflight failed
        if: steps.build.outcome != 'success' || steps.preflight.outcome != 'success' || steps.build.outputs.artifact_exists != 'True'
        run: exit 1
